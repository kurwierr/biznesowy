<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biznesowy</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23000'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' font-weight='700' fill='%23fff' text-anchor='middle'%3EB%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0d0d0d;
      --bg2:     #111111;
      --bg3:     #181818;
      --card:    #161616;
      --card2:   #1e1e1e;
      --dim:     rgba(255,255,255,0.06);
      --dim2:    rgba(255,255,255,0.03);
      --text:    #f2f2f2;
      --text2:   #999999;
      --text3:   #555555;
      --border:  rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.05);
      --success: #6ee7b7;
      --error:   #fca5a5;
      --radius:  12px;
      --radius-sm: 7px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow:hidden; }

    @keyframes fadeIn  { from{opacity:0}to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
    @keyframes spin    { to{transform:rotate(360deg)} }
    @keyframes pulse-dot { 0%,100%{opacity:1}50%{opacity:.35} }

    /* ── MODAL ── */
    #modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.9);
      backdrop-filter:blur(10px); display:flex;
      align-items:center; justify-content:center; z-index:1000;
      animation:fadeIn .25s ease;
    }
    .modal-box {
      background:var(--card); border:1px solid var(--border2); border-radius:18px;
      padding:44px 50px; width:100%; max-width:400px;
      animation:slideUp .3s cubic-bezier(.22,1,.36,1);
      box-shadow:0 40px 100px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.04);
      position:relative;
    }
    .modal-box::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
    }
    .modal-logo {
      font-family:'Outfit',sans-serif; font-size:24px; font-weight:300;
      letter-spacing:5px; text-transform:uppercase; text-align:center;
      color:#fff; margin-bottom:32px;
    }
    .saved-nicks { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; min-height:0; }
    .nick-chip {
      background:var(--bg3); border:1px solid var(--border2); border-radius:20px;
      padding:4px 11px; font-size:12px; color:var(--text2); cursor:pointer; transition:all .15s;
    }
    .nick-chip:hover { border-color:var(--border); color:var(--text); }
    .input-group { margin-bottom:14px; }
    .input-label { display:block; font-size:11px; color:var(--text3); margin-bottom:6px; letter-spacing:.8px; text-transform:uppercase; font-weight:500; }
    .input-field {
      width:100%; background:var(--bg); border:1px solid var(--border2);
      border-radius:var(--radius-sm); padding:11px 14px; color:var(--text);
      font-family:'Outfit',sans-serif; font-size:14px; transition:border-color .18s; outline:none;
    }
    .input-field:focus { border-color:var(--border); }
    .input-field::placeholder { color:var(--text3); }
    .btn-primary {
      width:100%; background:#fff; border:none; border-radius:var(--radius-sm);
      padding:12px; color:#000; font-family:'Outfit',sans-serif;
      font-size:14px; font-weight:600; cursor:pointer; transition:all .18s; margin-top:8px;
    }
    .btn-primary:hover { background:#e5e5e5; }
    .btn-primary:disabled { opacity:.35; cursor:not-allowed; }
    .error-msg { color:var(--error); font-size:12px; margin-top:10px; text-align:center; min-height:18px; }

    /* ── APP ── */
    #app { display:none; height:100vh; flex-direction:row; }
    #app.visible { display:flex; }

    /* ── MAIN COL ── */
    #main-col { display:flex; flex-direction:column; flex:1; min-width:0; }

    /* ── TOPBAR ── */
    .topbar {
      display:flex; align-items:center; padding:0 16px; height:48px;
      background:var(--bg2); border-bottom:1px solid var(--border2);
      flex-shrink:0; gap:12px;
    }
    .topbar-logo {
      font-family:'Outfit',sans-serif; font-weight:300; font-size:14px;
      letter-spacing:5px; text-transform:uppercase; color:#fff;
      flex-shrink:0; padding-right:12px; border-right:1px solid var(--border2);
    }
    .viewers-inline { display:flex; align-items:center; gap:5px; flex-shrink:0; flex-wrap:wrap; }
    .viewer-chip-top {
      display:flex; align-items:center; gap:5px;
      background:var(--dim2); border:1px solid var(--border2);
      border-radius:20px; padding:3px 9px 3px 4px;
      font-size:12px; color:var(--text2); white-space:nowrap;
    }
    .viewer-chip-av {
      width:30px; height:30px; border-radius:50%; background:var(--bg3);
      border:1px solid var(--border2); display:flex; align-items:center;
      justify-content:center; font-size:10px; font-weight:600; color:var(--text2);
    }
    .topbar-sep { width:1px; height:20px; background:var(--border2); flex-shrink:0; }
    .user-badge {
      display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2);
      flex-shrink:0; margin-left:auto; padding-left:12px; border-left:1px solid var(--border2);
    }

    /* ── ADD URL BAR ── */
    #add-bar {
      background:var(--bg2); border-bottom:1px solid var(--border2);
      padding:8px 16px;
    }
    #add-bar .inner { display:flex; gap:8px; align-items:center; }

    /* ── PLAYER ── */
    .player-wrap {
      flex:1; display:flex; align-items:center; justify-content:center;
      background:#000; position:relative; overflow:hidden;
    }
    #player-frame { width:100%; height:100%; border:none; display:none; }
    #gif-frame { display:none; max-width:100%; max-height:100%; object-fit:contain; }
    .player-placeholder {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:14px; color:var(--text3); text-align:center;
    }
    .player-placeholder svg { width:52px; height:52px; opacity:.15; }
    .player-placeholder p { font-size:14px; max-width:260px; line-height:1.7; font-weight:300; }

    /* full-player blocker — covers iframe so nobody can click progress bar */
    #player-blocker {
      position:absolute; inset:0; z-index:10;
      display:none; cursor:default; background:transparent;
    }
    #player-blocker.active { display:block; }

    /* ── BOTTOM BAR ── */
    .bottom-bar {
      background:var(--bg2); border-top:1px solid var(--border2);
      padding:9px 16px; display:flex; align-items:center;
      justify-content:center; gap:8px; flex-shrink:0; flex-wrap:wrap;
    }
    .ctrl-btn {
      background:var(--bg3); border:1px solid var(--border2);
      border-radius:var(--radius-sm); padding:8px 16px; color:var(--text2);
      font-family:'Outfit',sans-serif; font-size:13px; cursor:pointer;
      display:flex; align-items:center; gap:7px; transition:all .18s;
    }
    .ctrl-btn:hover:not(:disabled) { border-color:var(--border); color:var(--text); background:var(--dim); }
    .ctrl-btn:disabled { opacity:.2; cursor:not-allowed; }
    .ctrl-btn.danger:hover:not(:disabled) { border-color:rgba(252,165,165,.4); color:var(--error); }

    /* volume */
    .vol-wrap {
      display:flex; align-items:center; gap:7px;
      margin-left:4px; padding-left:12px; border-left:1px solid var(--border2);
    }
    .vol-icon { color:var(--text3); display:flex; align-items:center; cursor:pointer; transition:color .15s; }
    .vol-icon:hover { color:var(--text2); }
    input[type=range].vol-range {
      -webkit-appearance:none; appearance:none; width:80px; height:3px;
      border-radius:2px; outline:none; cursor:pointer;
      background:linear-gradient(to right,#ccc var(--pct,70%),#333 var(--pct,70%));
    }
    input[type=range].vol-range::-webkit-slider-thumb {
      -webkit-appearance:none; width:12px; height:12px;
      border-radius:50%; background:#fff; cursor:pointer;
    }
    input[type=range].vol-range::-moz-range-thumb {
      width:12px; height:12px; border:none; border-radius:50%; background:#fff; cursor:pointer;
    }
    .vol-pct { font-size:11px; color:var(--text3); width:28px; flex-shrink:0; }

    /* ── STATUS BAR ── */
    .status-bar {
      background:var(--bg); border-top:1px solid var(--border2);
      padding:4px 16px; display:flex; align-items:center; gap:8px;
      font-size:11px; color:var(--text3); flex-shrink:0;
    }
    .status-dot { width:5px; height:5px; border-radius:50%; background:var(--success); flex-shrink:0; }
    .status-dot.red    { background:var(--error); }
    .status-dot.yellow { background:#fcd34d; animation:pulse-dot 1.5s infinite; }

    /* ── PLAYLIST PANEL ── */
    #playlist-panel {
      width:260px; flex-shrink:0; background:var(--bg2);
      border-left:1px solid var(--border2); display:flex; flex-direction:column;
    }
    .playlist-header {
      padding:12px 14px 10px; border-bottom:1px solid var(--border2);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .playlist-title { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.8px; font-weight:600; }
    .playlist-count { font-size:11px; color:var(--text3); }
    .playlist-list  { flex:1; overflow-y:auto; padding:6px 0; }
    .pl-item {
      display:flex; align-items:center; gap:10px; padding:8px 14px;
      transition:background .15s; position:relative;
    }
    .pl-item:hover { background:var(--dim2); }
    .pl-item.active-item { background:var(--dim); }
    .pl-item.active-item .pl-title { color:var(--text); }
    .pl-thumb {
      width:48px; height:34px; border-radius:4px; overflow:hidden;
      background:var(--bg3); flex-shrink:0; display:flex;
      align-items:center; justify-content:center;
    }
    .pl-thumb img { width:100%; height:100%; object-fit:cover; }
    .pl-info { flex:1; min-width:0; }
    .pl-title { font-size:12px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .pl-sub   { font-size:10px; color:var(--text3); margin-top:2px; }
    .pl-actions { display:flex; gap:4px; opacity:0; transition:opacity .15s; }
    .pl-item:hover .pl-actions { opacity:1; }
    .pl-action-btn {
      background:none; border:none; color:var(--text3); cursor:pointer;
      padding:3px 5px; border-radius:4px; font-size:11px; transition:all .15s;
      display:flex; align-items:center;
    }
    .pl-action-btn:hover { background:var(--dim); color:var(--text); }
    .pl-action-btn.del:hover { color:var(--error); }
    .pl-now-playing {
      width:6px; height:6px; border-radius:50%; background:var(--success);
      flex-shrink:0; animation:pulse-dot 2s infinite;
    }
    .playlist-empty { padding:28px 14px; text-align:center; font-size:12px; color:var(--text3); line-height:1.6; }

    /* ── TOAST ── */
    #toast {
      position:fixed; bottom:20px; left:50%;
      transform:translateX(-50%) translateY(60px);
      background:var(--card2); border:1px solid var(--border);
      border-radius:var(--radius-sm); padding:9px 18px;
      font-size:13px; color:var(--text);
      transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .28s;
      opacity:0; z-index:2000; pointer-events:none;
      max-width:300px; text-align:center; box-shadow:0 8px 30px rgba(0,0,0,.5);
    }
    #toast.show    { transform:translateX(-50%) translateY(0); opacity:1; }
    #toast.success { color:var(--success); border-color:rgba(110,231,183,.25); }
    #toast.error   { color:var(--error);   border-color:rgba(252,165,165,.25); }

    /* small btn */
    .btn-sm {
      background:var(--bg3); border:1px solid var(--border2);
      border-radius:var(--radius-sm); padding:7px 13px; color:var(--text2);
      font-family:'Outfit',sans-serif; font-size:12px; font-weight:500;
      cursor:pointer; transition:all .18s; white-space:nowrap; flex-shrink:0;
    }
    .btn-sm:hover { border-color:var(--border); color:var(--text); background:var(--dim); }
    .btn-sm.white { background:#fff; color:#000; border-color:#fff; font-weight:600; }
    .btn-sm.white:hover { background:#e5e5e5; border-color:#e5e5e5; }


    /* ── AVATAR ── */
    .avatar-pick-wrap {
      display:flex; align-items:center; gap:12px; margin-bottom:20px;
    }
    .avatar-circle {
      width:56px; height:56px; border-radius:50%;
      background:var(--bg3); border:1.5px dashed var(--border);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; overflow:hidden; flex-shrink:0;
      transition:border-color .18s;
      position:relative;
    }
    .avatar-circle:hover { border-color:var(--border); }
    .avatar-circle img { width:100%; height:100%; object-fit:cover; }
    .avatar-circle .av-placeholder {
      display:flex; flex-direction:column; align-items:center; gap:3px;
      color:var(--text3); font-size:10px; pointer-events:none;
    }
    .avatar-circle .av-placeholder svg { opacity:.4; }
    .avatar-pick-label { font-size:12px; color:var(--text3); line-height:1.5; }

    /* avatar in topbar chip */
    .viewer-chip-av img {
      width:100%; height:100%; object-fit:cover; border-radius:50%;
    }

    /* avatar in user badge */
    .badge-av {
      width:30px; height:30px; border-radius:50%; overflow:hidden;
      background:var(--bg3); border:1px solid var(--border2);
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:600; color:var(--text2); flex-shrink:0;
    }
    .badge-av img { width:100%; height:100%; object-fit:cover; }

    /* ── HISTORY PANEL (tab inside playlist panel) ── */
    .panel-tabs {
      display:flex; border-bottom:1px solid var(--border2); flex-shrink:0;
    }
    .panel-tab {
      flex:1; padding:9px 0; font-size:11px; color:var(--text3);
      text-align:center; cursor:pointer; letter-spacing:.5px;
      text-transform:uppercase; font-weight:600; transition:all .15s;
      border-bottom:2px solid transparent; margin-bottom:-1px;
    }
    .panel-tab:hover { color:var(--text2); }
    .panel-tab.active { color:var(--text); border-bottom-color:var(--text); }

    /* ── GLOBAL ACTION TOAST (who did what) ── */
    #action-toast {
      position:fixed; top:60px; left:50%;
      transform:translateX(-50%) translateY(-20px);
      background:rgba(20,20,20,0.92); border:1px solid var(--border);
      border-radius:20px; padding:7px 16px;
      font-size:12px; color:var(--text2);
      transition:transform .25s cubic-bezier(.34,1.56,.64,1), opacity .25s;
      opacity:0; z-index:1500; pointer-events:none;
      backdrop-filter:blur(10px); white-space:nowrap;
      box-shadow:0 4px 20px rgba(0,0,0,.5);
    }
    #action-toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:10px; }
  </style>
</head>
<body>

<!-- ══ MODAL ══ -->
<div id="modal-overlay">
  <div class="modal-box">
    <div class="modal-logo">Biznesowy</div>
    <!-- avatar picker -->
    <div class="avatar-pick-wrap">
      <div class="avatar-circle" id="avatar-circle" onclick="document.getElementById('avatar-file').click()" title="Dodaj zdjęcie profilowe">
        <div class="av-placeholder" id="av-placeholder">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Dodaj</span>
        </div>
        <img id="av-preview" src="" alt="" style="display:none;width:100%;height:100%;object-fit:cover;" />
      </div>
      <div class="avatar-pick-label">Kliknij żeby dodać<br>zdjęcie profilowe<br><span style="color:var(--text3);font-size:11px;">(opcjonalne)</span></div>
    </div>
    <input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="onAvatarPicked(this)" />

    <div class="input-group">
      <label class="input-label">Nick</label>
      <div class="saved-nicks" id="saved-nicks"></div>
      <input class="input-field" id="nick-input" type="text" maxlength="20" autocomplete="off" />
    </div>
    <button class="btn-primary" id="join-btn" onclick="joinRoom()">Wejdź</button>
    <div class="error-msg" id="join-error"></div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <div id="main-col">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-logo">Biznesowy</div>
      <div class="viewers-inline" id="viewers-inline"></div>
      <div class="topbar-sep"></div>
      <div class="user-badge" id="user-badge" style="display:none"></div>
    </div>

    <!-- ADD URL BAR -->
    <div id="add-bar">
      <div class="inner">
        <input id="url-input" class="input-field" style="flex:1;padding:7px 12px;font-size:13px;"
               type="text" placeholder="Wklej link YouTube lub URL do GIFa..." />
        <button class="btn-sm white" onclick="addToQueue()">+ Dodaj do kolejki</button>
      </div>
    </div>

    <!-- PLAYER -->
    <div class="player-wrap">
      <div class="player-placeholder" id="player-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width=".8">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <p>Kolejka jest pusta</p>
      </div>
      <iframe id="player-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
      <img id="gif-frame" src="" alt="" style="display:none;max-width:100%;max-height:100%;object-fit:contain;" />
      <!-- blocks clicks on the YT iframe (progress bar etc) -->
      <div id="player-blocker"></div>
    </div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
      <button class="ctrl-btn" id="btn-play" onclick="ctrlPlay()" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        Play
      </button>
      <button class="ctrl-btn" id="btn-pause" onclick="ctrlPause()" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
        Pauza
      </button>
      <button class="ctrl-btn" id="btn-seek-back" onclick="ctrlSeek(-10)" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.35"/>
        </svg>
        −10s
      </button>
      <button class="ctrl-btn" id="btn-seek-fwd" onclick="ctrlSeek(10)" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.35"/>
        </svg>
        +10s
      </button>
      <button class="ctrl-btn danger" id="btn-skip" onclick="ctrlSkip()" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,4 15,12 5,20"/><rect x="16" y="4" width="3" height="16"/>
        </svg>
        Pomiń
      </button>

      <div style="flex:1"></div>

      <!-- volume -->
      <div class="vol-wrap">
        <span class="vol-icon" onclick="toggleMute()" title="Wycisz">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path id="vol-wave1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path id="vol-wave2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </span>
        <input type="range" class="vol-range" id="vol-range" min="0" max="100" value="70"
               oninput="onVolInput(this.value)" />
        <span class="vol-pct" id="vol-pct">70%</span>
      </div>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Łączenie...</span>
    </div>

  </div><!-- #main-col -->

  <!-- PLAYLIST PANEL -->
  <div id="playlist-panel">
    <div class="panel-tabs">
      <div class="panel-tab active" id="tab-queue" onclick="switchTab('queue')">
        Kolejka <span id="pl-count" style="opacity:.5"></span>
      </div>
      <div class="panel-tab" id="tab-history" onclick="switchTab('history')">
        Historia
      </div>
    </div>
    <div class="playlist-list" id="playlist-list">
      <div class="playlist-empty">Kolejka jest pusta.<br>Dodaj film, żeby zacząć.</div>
    </div>
    <div class="playlist-list" id="history-list" style="display:none">
      <div class="playlist-empty">Brak historii.</div>
    </div>
  </div>

</div><!-- #app -->

<div id="toast"></div>
<div id="action-toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, push, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ── FIREBASE CONFIG ── */
const firebaseConfig = {
  apiKey: "AIzaSyDSwwh3kPFZZZfIYS9PsqvuZiKoNbzmvi8",
  authDomain: "biznesowy-watch.firebaseapp.com",
  databaseURL: "https://biznesowy-watch-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "biznesowy-watch",
  storageBucket: "biznesowy-watch.firebasestorage.app",
  messagingSenderId: "46337543990",
  appId: "1:46337543990:web:86ca3ca124ca4eede76d97"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getDatabase(fbApp);

/* ── STATE ── */
let myNick = null, myId = null;
let isPlaying  = false;
let currentKey = null;
let playlist   = {};
let lastSeekTime = 0;
let isMuted = false;
let volBeforeMute = 70;
let activeTab = 'queue';

/* ── UTILS ── */
const genId = () => Math.random().toString(36).slice(2,10);
const escHtml = s => String(s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

window.showToast = (msg, type='') => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show '+type;
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.className='', 3000);
};

const setStatus = (msg, color='green') => {
  document.getElementById('status-text').textContent = msg;
  const d = document.getElementById('status-dot');
  d.className = 'status-dot';
  if (color==='red')    d.classList.add('red');
  if (color==='yellow') d.classList.add('yellow');
};

/* ── SAVED NICKS ── */
const NICK_KEY = 'biz_nicks';
const VOL_KEY  = 'biz_vol';
const MUTE_KEY = 'biz_mute';

function getSavedNicks() {
  try { return JSON.parse(localStorage.getItem(NICK_KEY)||'[]'); } catch { return []; }
}
function saveNick(nick) {
  let n = getSavedNicks().filter(x => x!==nick);
  n.unshift(nick); n = n.slice(0,5);
  localStorage.setItem(NICK_KEY, JSON.stringify(n));
}
function renderSavedNicks() {
  const nicks = getSavedNicks();
  const el = document.getElementById('saved-nicks');
  if (!nicks.length) { el.style.display='none'; return; }
  el.style.display='flex';
  el.innerHTML = nicks.map(n =>
    `<span class="nick-chip" onclick="document.getElementById('nick-input').value='${n.replace(/'/g,"\\'")}'">${escHtml(n)}</span>`
  ).join('');
}
renderSavedNicks();


/* ── AVATAR ── */
const AV_KEY = 'biz_avatar';

function loadSavedAvatar() {
  const saved = localStorage.getItem(AV_KEY);
  if (saved) showAvatarPreview(saved);
}
loadSavedAvatar();

window.onAvatarPicked = function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const b64raw = e.target.result;
    if (file.type === 'image/gif') {
      // GIF: save as-is to preserve animation
      localStorage.setItem(AV_KEY, b64raw);
      showAvatarPreview(b64raw);
    } else {
      // Static image: crop & scale to 80x80 via canvas
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 80; canvas.height = 80;
        const ctx  = canvas.getContext('2d');
        const size = Math.min(img.width, img.height);
        const sx   = (img.width  - size) / 2;
        const sy   = (img.height - size) / 2;
        ctx.drawImage(img, sx, sy, size, size, 0, 0, 80, 80);
        const b64 = canvas.toDataURL('image/jpeg', 0.75);
        localStorage.setItem(AV_KEY, b64);
        showAvatarPreview(b64);
      };
      img.src = b64raw;
    }
  };
  reader.readAsDataURL(file);
};

function showAvatarPreview(b64) {
  const preview = document.getElementById('av-preview');
  const placeholder = document.getElementById('av-placeholder');
  if (preview && placeholder) {
    preview.src = b64;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
  }
}

function getMyAvatar() {
  return localStorage.getItem(AV_KEY) || null;
}

/* ── JOIN ── */
window.joinRoom = async () => {
  const nick = document.getElementById('nick-input').value.trim();
  if (!nick) { document.getElementById('join-error').textContent='Wpisz nick!'; return; }
  const btn = document.getElementById('join-btn');
  btn.disabled = true;
  myNick = nick; myId = genId();
  saveNick(nick);

  const vRef = ref(db, `viewers/${myId}`);
  try {
    const avatar = getMyAvatar();
    await set(vRef, { nick, avatar: avatar||null, joinedAt: Date.now(), lastSeen: Date.now() });
  } catch(e) {
    document.getElementById('join-error').textContent = 'Błąd połączenia z bazą.';
    btn.disabled = false; return;
  }

  setInterval(() => update(vRef, { lastSeen: Date.now() }), 10000);
  window.addEventListener('beforeunload', () => set(vRef, null));

  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  // user badge
  const badge = document.getElementById('user-badge');
  badge.style.display = 'flex';
  const myAv = getMyAvatar();
  badge.innerHTML = `
    <div class="badge-av">
      ${myAv ? `<img src="${myAv}" alt="" />` : escHtml(nick.charAt(0).toUpperCase())}
    </div>
    ${escHtml(nick)}`;

  // enable controls
  ['btn-play','btn-pause','btn-seek-back','btn-seek-fwd','btn-skip']
    .forEach(id => document.getElementById(id).disabled = false);

  initVolume();
  listenRoom();
  listenViewers();
  listenPlaylist();
  listenHistory();
  listenActions();
  setStatus('Połączono','green');
};


/* ── ACTION TOAST (global — shown to everyone) ── */
function listenActions() {
  onValue(ref(db,'lastAction'), snap => {
    const d = snap.val();
    if (!d || !d.msg || !d.ts) return;
    // only show if recent (within 5s of now)
    if (Date.now() - d.ts > 5000) return;
    showActionToast(d.msg);
  });
}

function showActionToast(msg) {
  const el = document.getElementById('action-toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(window._att);
  window._att = setTimeout(() => el.classList.remove('show'), 3000);
}

async function writeAction(msg) {
  await update(ref(db,'lastAction'), { msg, ts: Date.now() });
}

/* ── TAB SWITCH ── */
window.switchTab = function(tab) {
  activeTab = tab;
  document.getElementById('tab-queue').classList.toggle('active', tab==='queue');
  document.getElementById('tab-history').classList.toggle('active', tab==='history');
  document.getElementById('playlist-list').style.display  = tab==='queue'   ? 'block' : 'none';
  document.getElementById('history-list').style.display   = tab==='history' ? 'block' : 'none';
};

/* ── HISTORY ── */
const HIST_MAX = 30;

function listenHistory() {
  onValue(ref(db,'history'), snap => {
    renderHistory(snap.val() || {});
  });
}

function renderHistory(hist) {
  const list = document.getElementById('history-list');
  const entries = Object.entries(hist)
    .sort((a,b) => (b[1].playedAt||0) - (a[1].playedAt||0));

  if (!entries.length) {
    list.innerHTML = '<div class="playlist-empty">Brak historii.</div>';
    return;
  }

  list.innerHTML = entries.map(([key, item]) => {
    const thumb = ytThumb(item.url);
    return `
    <div class="pl-item">
      <div style="width:6px;flex-shrink:0"></div>
      <div class="pl-thumb">
        ${thumb
          ? `<img src="${thumb}" loading="lazy" alt="" />`
          : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.3"><polygon points="5,3 19,12 5,21"/></svg>`
        }
      </div>
      <div class="pl-info">
        <div class="pl-title">${escHtml(item.title||'Film')}</div>
        <div class="pl-sub">${item.addedBy ? escHtml(item.addedBy) : ''}</div>
      </div>
      <div class="pl-actions">
        <button class="pl-action-btn" onclick="replayFromHistory(${JSON.stringify(JSON.stringify(item))})" title="Dodaj ponownie">+</button>
      </div>
    </div>`;
  }).join('');
}

window.replayFromHistory = async function(itemJson) {
  const item = JSON.parse(itemJson);
  await push(ref(db,'playlist'), { ...item, addedBy: myNick, addedAt: Date.now() });
  showToast('✓ Dodano do kolejki','success');
  switchTab('queue');
};

async function addToHistory(item) {
  if (!item) return;
  // push to history, then trim to HIST_MAX
  const newRef = push(ref(db,'history'));
  await set(newRef, { ...item, playedAt: Date.now() });
  // trim oldest if over limit
  const snap = await get(ref(db,'history'));
  const entries = Object.entries(snap.val()||{})
    .sort((a,b) => (a[1].playedAt||0) - (b[1].playedAt||0));
  if (entries.length > HIST_MAX) {
    const toDelete = entries.slice(0, entries.length - HIST_MAX);
    for (const [k] of toDelete) await remove(ref(db,`history/${k}`));
  }
}

/* ── ROOM LISTENER ── */
function listenRoom() {
  onValue(ref(db,'room'), snap => {
    const data = snap.val() || {};

    // play/pause
    if (data.isPlaying !== isPlaying) {
      isPlaying = !!data.isPlaying;
      isPlaying ? doPlay() : doPause();
    }

    // seek
    const st = data.seekTo ?? 0;
    if (st !== lastSeekTime) {
      lastSeekTime = st;
      doSeekTo(st);
    }

    // current track
    if (data.currentKey !== currentKey) {
      // save old track to history before switching
      if (currentKey && playlist[currentKey] && !data.currentKey) {
        addToHistory(playlist[currentKey]);
      }
      currentKey = data.currentKey ?? null;
      renderPlaylist();
      if (currentKey && playlist[currentKey]) {
        const item = playlist[currentKey];
        loadMedia(item);
        const isGif = item.type==='gif' || isGifUrl(item.url);
        ['btn-play','btn-pause','btn-seek-back','btn-seek-fwd']
          .forEach(id => { document.getElementById(id).disabled = isGif; });
      } else if (!currentKey) {
        clearPlayer();
      }
    }
  });
}

/* ── PLAYLIST LISTENER ── */
function listenPlaylist() {
  onValue(ref(db,'playlist'), snap => {
    playlist = snap.val() || {};
    renderPlaylist();
    // if nothing playing and queue has items, auto-start first
    if (!currentKey) {
      const keys = sortedKeys();
      if (keys.length) advanceToKey(keys[0]);
    }
  });
}

/* ── VIEWERS LISTENER ── */
function listenViewers() {
  onValue(ref(db,'viewers'), snap => {
    const data = snap.val() || {};
    const now  = Date.now();
    const active = Object.entries(data).filter(([,v]) =>
      !v.lastSeen || (now-v.lastSeen<25000) || (now-v.joinedAt<30000)
    );
    document.getElementById('viewers-inline').innerHTML = active.map(([,v]) => `
      <div class="viewer-chip-top">
        <div class="viewer-chip-av">
          ${v.avatar
            ? `<img src="${v.avatar}" alt="" />`
            : escHtml(v.nick.charAt(0).toUpperCase())
          }
        </div>
        ${escHtml(v.nick)}
      </div>
    `).join('');
  });
}

/* ── RENDER PLAYLIST ── */
function sortedKeys() {
  return Object.keys(playlist).sort((a,b) => (playlist[a].addedAt||0)-(playlist[b].addedAt||0));
}

function renderPlaylist() {
  const list  = document.getElementById('playlist-list');
  const keys  = sortedKeys();

  const count = document.getElementById('pl-count');
  count.textContent = keys.length ? `(${keys.length})` : '';

  if (!keys.length) {
    list.innerHTML = '<div class="playlist-empty">Kolejka jest pusta.<br>Dodaj film, żeby zacząć.</div>';
    return;
  }

  list.innerHTML = keys.map(key => {
    const item     = playlist[key];
    const isActive = key === currentKey;
    const thumb    = ytThumb(item.url);
    return `
    <div class="pl-item ${isActive?'active-item':''}">
      ${isActive
        ? '<div class="pl-now-playing"></div>'
        : '<div style="width:6px;flex-shrink:0"></div>'
      }
      <div class="pl-thumb">
        ${thumb
          ? `<img src="${thumb}" loading="lazy" alt="" />`
          : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.3"><polygon points="5,3 19,12 5,21"/></svg>`
        }
      </div>
      <div class="pl-info">
        <div class="pl-title">${escHtml(item.title||item.ytId||'Film')}</div>
        ${item.addedBy ? `<div class="pl-sub">dodał: ${escHtml(item.addedBy)}</div>` : ''}
      </div>
      <div class="pl-actions">
        ${!isActive ? `<button class="pl-action-btn" onclick="advanceToKey('${key}')" title="Odtwórz teraz">▶</button>` : ''}
        <button class="pl-action-btn del" onclick="removeFromQueue('${key}')" title="Usuń">✕</button>
      </div>
    </div>`;
  }).join('');
}

/* ── ADD TO QUEUE ── */
window.addToQueue = async () => {
  const url = document.getElementById('url-input').value.trim();
  if (!url) { showToast('Wklej link!','error'); return; }
  const ytId = extractYtId(url);
  const isGif = isGifUrl(url);
  if (!ytId && !isGif) { showToast('Podaj link YouTube lub bezpośredni URL do GIFa (.gif)','error'); return; }
  let canonUrl, title, ytId2, type;
  if (isGif) {
    canonUrl = url; title = url.split('/').pop().split('?')[0] || 'GIF'; ytId2 = null; type = 'gif';
  } else {
    canonUrl = `https://www.youtube.com/watch?v=${ytId}`; ytId2 = ytId; type = 'youtube';
    title = ytId;
    try {
      const res  = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(canonUrl)}`);
      const data = await res.json();
      if (data.title) title = data.title;
    } catch {}
  }
  try {
    await push(ref(db,'playlist'), { url:canonUrl, ytId:ytId2||null, type, title, addedBy:myNick, addedAt:Date.now() });
    document.getElementById('url-input').value = '';
    showToast('✓ Dodano do kolejki','success');
    await writeAction(`➕ ${myNick} dodał: ${title}`);
  } catch(e) {
    showToast('Błąd zapisu — sprawdź reguły Firebase','error');
  }
};

/* ── ADVANCE / SKIP ── */
window.advanceToKey = async key => {
  await update(ref(db,'room'), { currentKey:key, isPlaying:false, seekTo:0 });
};

window.ctrlSkip = async () => {
  if (!currentKey) return;
  const keys    = sortedKeys();
  const idx     = keys.indexOf(currentKey);
  const next    = keys[idx+1] ?? null;
  const skipped = playlist[currentKey];
  if (skipped) {
    await addToHistory(skipped);
    await writeAction(`⏭ ${myNick} pominął: ${skipped.title||'Film'}`);
  }
  await remove(ref(db,`playlist/${currentKey}`));
  if (next) {
    await update(ref(db,'room'), { currentKey:next, isPlaying:false, seekTo:0 });
  } else {
    await update(ref(db,'room'), { currentKey:null, isPlaying:false, seekTo:0 });
  }
};

window.removeFromQueue = async key => {
  if (key === currentKey) { await window.ctrlSkip(); return; }
  await remove(ref(db,`playlist/${key}`));
  showToast('Usunięto z kolejki');
};

/* ── PLAYER ── */
function loadMedia(item) {
  const frame   = document.getElementById('player-frame');
  const gifEl   = document.getElementById('gif-frame');
  const blocker = document.getElementById('player-blocker');
  document.getElementById('player-placeholder').style.display = 'none';

  if (item.type === 'gif' || isGifUrl(item.url)) {
    // GIF — simple img tag, no controls needed
    frame.style.display = 'none'; frame.src = '';
    gifEl.src = item.url;
    gifEl.style.display = 'block';
    blocker.classList.remove('active'); // no iframe to block
    setStatus('🎞 GIF','green');
  } else {
    // YouTube
    const ytId = item.ytId || extractYtId(item.url);
    if (!ytId) return;
    const embedUrl = `https://www.youtube.com/embed/${ytId}?autoplay=0&enablejsapi=1&origin=${encodeURIComponent(location.origin)}&rel=0`;
    gifEl.style.display = 'none'; gifEl.src = '';
    if (frame.src === embedUrl) return;
    frame.src = embedUrl;
    frame.style.display = 'block';
    blocker.classList.add('active');
    frame.onload = () => applyStoredVolume();
  }
}

function clearPlayer() {
  const frame = document.getElementById('player-frame');
  const gifEl = document.getElementById('gif-frame');
  frame.src = ''; frame.style.display = 'none';
  gifEl.src = ''; gifEl.style.display = 'none';
  document.getElementById('player-placeholder').style.display = 'flex';
  document.getElementById('player-blocker').classList.remove('active');
}

function doPlay() {
  const frame = document.getElementById('player-frame');
  if (!frame || frame.style.display==='none') return;
  try { frame.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}','*'); } catch {}
  setStatus('▶ Odtwarzanie','green');
}

function doPause() {
  const frame = document.getElementById('player-frame');
  if (!frame || frame.style.display==='none') return;
  try { frame.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}','*'); } catch {}
  setStatus('⏸ Pauza','yellow');
}

function doSeekTo(s) {
  const frame = document.getElementById('player-frame');
  if (!frame || frame.style.display==='none') return;
  try { frame.contentWindow.postMessage(`{"event":"command","func":"seekTo","args":[${s},true]}`,'*'); } catch {}
}

/* ── PLAYBACK CONTROLS ── */
window.ctrlPlay  = async () => update(ref(db,'room'), { isPlaying:true });
window.ctrlPause = async () => update(ref(db,'room'), { isPlaying:false });

window.ctrlSeek = async delta => {
  const snap = await get(ref(db,'room/seekTo'));
  const t    = Math.max(0,(snap.val()||0)+delta);
  await update(ref(db,'room'), { seekTo:t, seekTs:Date.now() });
};

/* ── VOLUME ── */
function initVolume() {
  const saved = parseInt(localStorage.getItem(VOL_KEY)||'70', 10);
  isMuted     = localStorage.getItem(MUTE_KEY)==='1';
  setVolSlider(isMuted ? 0 : saved, false);
  if (!isMuted) volBeforeMute = saved;
}

window.onVolInput = val => {
  val = parseInt(val, 10);
  isMuted = val===0;
  if (!isMuted) volBeforeMute = val;
  localStorage.setItem(VOL_KEY, val);
  localStorage.setItem(MUTE_KEY, isMuted?'1':'0');
  setVolSlider(val, true);
  sendVolToYT(val);
};

window.toggleMute = () => {
  if (isMuted) {
    isMuted = false;
    const v = volBeforeMute||70;
    setVolSlider(v, false); sendVolToYT(v);
    localStorage.setItem(MUTE_KEY,'0');
  } else {
    isMuted = true;
    volBeforeMute = parseInt(document.getElementById('vol-range').value,10)||70;
    setVolSlider(0, false); sendVolToYT(0);
    localStorage.setItem(MUTE_KEY,'1');
  }
};

function setVolSlider(val, fromInput) {
  const range = document.getElementById('vol-range');
  const pct   = document.getElementById('vol-pct');
  const w1    = document.getElementById('vol-wave1');
  const w2    = document.getElementById('vol-wave2');
  if (!fromInput) range.value = val;
  range.style.setProperty('--pct', val+'%');
  if (pct) pct.textContent = val+'%';
  if (w1) w1.style.display = val<1  ? 'none' : '';
  if (w2) w2.style.display = val<50 ? 'none' : '';
}

function sendVolToYT(val) {
  const frame = document.getElementById('player-frame');
  if (!frame || frame.style.display==='none') return;
  try {
    frame.contentWindow.postMessage(JSON.stringify({event:'command',func:'setVolume',args:[val]}),'*');
    frame.contentWindow.postMessage(
      JSON.stringify({event:'command',func: val===0 ? 'mute' : 'unMute',args:[]}),'*'
    );
  } catch {}
}

function applyStoredVolume() {
  setTimeout(() => {
    const val = isMuted ? 0 : parseInt(localStorage.getItem(VOL_KEY)||'70',10);
    sendVolToYT(val);
  }, 1200);
}

/* ── HELPERS ── */
function isGifUrl(url) {
  return /\.gif(\?|$)/i.test(url) || url.includes('tenor.com/view') || url.includes('giphy.com/media') || url.includes('giphy.com/gifs');
}

function extractYtId(url) {
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function ytThumb(url) {
  if (isGifUrl(url)) return url; // use gif itself as thumbnail
  const id = extractYtId(url);
  return id ? `https://i.ytimg.com/vi/${id}/mqdefault.jpg` : null;
}

/* ── KEYBOARD ── */
document.getElementById('nick-input').addEventListener('keydown', e => { if(e.key==='Enter') window.joinRoom(); });
document.getElementById('url-input')?.addEventListener('keydown', e => { if(e.key==='Enter') window.addToQueue(); });

/* ── DB STATUS ── */
onValue(ref(db,'.info/connected'), snap => {
  if (!snap.val()) setStatus('Brak połączenia','red');
  else if (myNick)  setStatus('Połączono','green');
});
</script>
